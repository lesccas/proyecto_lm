<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tienda</title>
  </head>
  <body>
    <header>
      <div class="logo-area">
        <h1>Eneba Clone</h1>
      </div>
      <div class="buscador-area">
        <form>
          <input
            type="search"
            name="search"
            class="search-input"
            placeholder="Buscar producto..."
          />
          <button type="submit">Buscar</button>
        </form>
      </div>
      <nav class="usuario-area">
        <a href="index.html" class="tienda-link">Tienda</a>
        <a href="#" class="carrito-link">Carrito</a>
        <a href="#" class="login-link">Login</a>
      </nav>
    </header>
    <main>
      <h1>Catálogo de Juegos</h1>
      <!-- Catálogo -->
      <div class="producto1">
        <section>
          <img src="" alt="Producto1" />
          <h2>Nombre del producto</h2>
          <div>
            <p>Precio</p>
            <p>Precio descuento</p>
            <button type="button">Añadir al carrito</button>
          </div>
          <div>
            <h3>Descripción</h3>
            <p>Descripción del producto...</p>
          </div>
        </section>
      </div>

      <!-- Filtro lateral -->
      <div class="filtro-lateral">
        <div class="filtro-plataforma">
          <h3>Plataforma</h3>
          <hr />
          <div class="opciones-filtro">
            <label>
              <input type="radio" name="plataforma" value="todas" checked />
              Todas
            </label>
            <label>
              <input type="radio" name="plataforma" value="pc" />
              Marca1
            </label>
            <label>
              <input type="radio" name="plataforma" value="ps5" />
              Marca2
            </label>
            <label>
              <input type="radio" name="plataforma" value="xbox" />
              Xbox
            </label>
            <label>
              <input type="radio" name="plataforma" value="switch" />
              Switch
            </label>
          </div>
        </div>
        <div class="filtro-precio">
          <h3>Precio (€)</h3>
          <hr />
          <div class="rango-precio">
            <input type="text" id="precio-min" placeholder="Min" min="0" />
            <span>-</span>
            <input type="text" id="precio-max" placeholder="Max" min="0" />
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
