<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="styles2.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap"
      rel="stylesheet"
    />
    <!-- icono buscador -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=search"
    />
    <title>Farmacia Prada | Productos</title>
  </head>
  <body>
    <header>
      <div class="logo-area">
        <a></a>
        <h1 class="titulo">Prada Farma<br /><span>FARMACIA PRADA</span></h1>
      </div>
      <div class="buscador-area">
        <form action="buscar" method="get" class="buscador-farmacia">
          <span class="material-symbols-outlined">search</span>
          <input
            type="text"
            name="q"
            class="search-input"
            placeholder="Buscar producto, marca..."
          />
          <button type="submit">Buscar</button>
        </form>
      </div>
      <nav class="usuario-area">
        <a href="#" class="login-link"
          ><span
            ><img
              width="24"
              height="24"
              src="https://img.icons8.com/forma-thin/24/user.png"
              alt="user"
            />
          </span>
          Acceso</a
        >
        <a href="#" class="cesta-link"
          ><img
            width="48"
            height="48"
            src="https://img.icons8.com/pulsar-line/48/shopping-cart.png"
            alt="shopping-cart"
          />
          Cesta</a
        >
      </nav>
    </header>
    <main>
      <a href="index1.html" class="principal-link">&#8592 Volver a la tienda</a>
      <section>
        <img src="assets/productos/La Roche-Posay Anthelios UVMune 400 SPF 50+.jpg" alt="la-roche-posay" />
        <h2>La Roche-Posay Anthelios UVMune 400 SPF 50+</h2>
        <div>
          <p>Precio</p>
          <p>Precio descuento</p>
          <button type="button">Añadir al carrito</button>
        </div>
        <div>
          <h3>Descripción</h3>
          <p>Descripción del producto...</p>
        </div>
      </section>
    </main>
  </body>
</html>
