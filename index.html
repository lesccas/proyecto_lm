<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>Farmacia Prada | Farmacia en El Puerto de Santa María</title>
  </head>
  <body>
    <!-- PANTALLA DE INICIO -->
    <header>
      <div class="logo-area">
        <h1 class="titulo">Prada Farma<br /><span>FARMACIA PRADA</span></h1>
      </div>
      <div class="buscador-area">
        <form>
          <input
            type="search"
            name="search"
            class="search-input"
            placeholder="Buscar producto, marca..."
          />
          <button type="submit">Buscar</button>
        </form>
      </div>
      <nav class="usuario-area">
        <a href="#" class="login-link"
          ><span
            ><img
              width="24"
              height="24"
              src="https://img.icons8.com/forma-thin/24/user.png"
              alt="user"
            />
          </span>
          Acceso</a
        >
        <a href="#" class="cesta-link"
          ><img
            width="48"
            height="48"
            src="https://img.icons8.com/pulsar-line/48/shopping-cart.png"
            alt="shopping-cart"
          />
          Cesta</a
        >
      </nav>
    </header>
    <!-- MAIN -->
    <main>
      <section class="portada">
        <h2>Atención farmacéutica <br> <span>y cercana</span></h2>
        <p>
          Estamos en C. Luna, 46. Consulta horarios, dudas frecuentes y
          disponibilidad de productos. También puedes reservar una cita desde el
          chat.
        </p>
        <a href="#" class="tienda-link">Explorar tienda &#10140</a>
      </section>
      <section class="categorias-populares">
        <h3>Categorías Populares</h3>
        <div class="botones-populares">
          <button>Marca1</button>
          <button>Marca2</button>
          <button>Marca3</button>
          <button>Marca4</button>
        </div>
      </section>
      <section class="ofertas-destacadas">
        <h3>Ofertas destacadas</h3>
        <div class="grid-ofertas">
          <div class="tarjeta-oferta">
            <img src="#" alt="producto1" class="imagen-producto1" />
            <div class="info-producto">
              <h4>Nombre producto</h4>
              <div class="precios">
                <span class="precio-original"></span>
                <span class="precio-descuento"></span>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>
    <footer></footer>
  </body>
</html>
